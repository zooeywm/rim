name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install nightly rustfmt
        shell: bash
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - name: Check Rust formatting
        shell: bash
        run: rustfmt +nightly --check --edition 2024 $(git ls-files '*.rs')

      - name: Check workspace
        run: cargo check -q

      - name: Check test targets compile
        run: cargo test --workspace --no-run

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check TOML formatting
        shell: bash
        run: taplo fmt --check $(git ls-files '*.toml')

  build-release-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p rim-app

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: rim-linux-x86_64
          path: target/release/rim
          if-no-files-found: error

  build-release-windows:
    name: Build Windows Release
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p rim-app

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rim-windows-x86_64
          path: target/release/rim.exe
          if-no-files-found: error

  release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-release-linux
      - build-release-windows
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: rim-linux-x86_64
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: rim-windows-x86_64
          path: dist

      - name: Render release body
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME#v}"
          awk -v tag="$tag_name" '
            $0 ~ ("^## \\[" tag "\\]") {
              in_section = 1
            }
            in_section && $0 ~ "^## \\[" && $0 !~ ("^## \\[" tag "\\]") {
              exit
            }
            in_section {
              print
            }
          ' CHANGELOG.md > dist/release-body.md
          if [[ ! -s dist/release-body.md ]]; then
            echo "failed to extract changelog section for ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          cat <<'EOF' >> dist/release-body.md

          ## Release Assets

          - `rim`: Linux x86_64 binary
          - `rim.exe`: Windows x86_64 binary
          EOF

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-body.md
          files: |
            dist/rim
            dist/rim.exe
