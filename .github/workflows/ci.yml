name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  rustfmt-check:
    name: Rustfmt Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo +nightly fmt --all --check

  clippy-build-linux:
    name: Clippy and build Linux release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build release binary
        run: cargo build --release -p rim-app

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: rim-linux-x86_64
          path: target/release/rim
          if-no-files-found: error

  clippy-build-windows:
    name: Clippy and build Windows release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build release binary
        run: cargo build --release -p rim-app

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rim-windows-x86_64
          path: target/release/rim.exe
          if-no-files-found: error

  release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - clippy-build-linux
      - clippy-build-windows
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: rim-linux-x86_64
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: rim-windows-x86_64
          path: dist

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Release assets:

            - `rim`: Linux binary
            - `rim.exe`: Windows binary
          files: |
            dist/rim
            dist/rim.exe
